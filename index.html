<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karbantartás alatt | Mixademy</title>
    <link rel="shortcut icon" href="logo (2).png" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4">

    <div class="text-center max-w-md">
        <!-- Logo helye vagy ikon -->
        <div class="mb-8">
            <i class="fa-solid fa-gear text-6xl text-blue-500 animate-spin-slow"></i>
        </div>

        <h1 class="text-4xl font-bold mb-4">Hamarosan visszatérünk</h1>
        <p class="text-slate-400 mb-8">
            A Mixademy jelenleg fejlesztés alatt áll. Dolgozunk a rendszerek optimalizálásán, hogy a legjobb élményt nyújthassuk.
        </p>

        <div class="p-4 bg-slate-800 rounded-lg border border-slate-700">
            <p class="text-sm font-mono text-blue-400">
                &lt; Status: Maintenance Mode /&gt;
            </p>
        </div>
    </div>

    <style>
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin 8s linear infinite; }
    </style>
</body>
</html>
